name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ── Windows ──
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tools
        run: python -m pip install --upgrade pip setuptools wheel cffi numpy

      - name: Configure CMake
        run: |
          cmake -S . -B out/build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DWITH_SIMD=OFF `
            -DAWK=AWK-NOTFOUND

      - name: Build native library & CLI
        run: |
          cmake --build out/build --target jxlpy_native --config Release
          cmake --build out/build --target jxl_cli --config Release

      - name: Build wheel
        run: python -m pip wheel . --no-deps -w dist/

      - name: Package artifacts
        shell: pwsh
        run: |
          $cli = @(
            "out/build/libjxl/tools/cjxl.exe",
            "out/build/libjxl/tools/djxl.exe",
            "out/build/libjxl/tools/jxlinfo.exe",
            "out/build/libjxl/tools/jxltran.exe"
          )
          foreach ($f in $cli) {
            if (Test-Path $f) { Copy-Item $f -Destination "dist/" }
          }
          ls dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: dist/*
          if-no-files-found: error

  # ── Linux ──
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang ninja-build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tools
        run: python -m pip install --upgrade pip setuptools wheel cffi numpy

      - name: Configure CMake
        run: |
          cmake -S . -B out/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DWITH_SIMD=OFF \
            -DAWK=AWK-NOTFOUND

      - name: Build native library & CLI
        run: |
          cmake --build out/build --target jxlpy_native --config Release
          cmake --build out/build --target jxl_cli --config Release

      - name: Build wheel
        run: python -m pip wheel . --no-deps -w dist/

      - name: Package artifacts
        run: |
          for f in out/build/libjxl/tools/cjxl out/build/libjxl/tools/djxl \
                   out/build/libjxl/tools/jxlinfo out/build/libjxl/tools/jxltran; do
            [ -f "$f" ] && cp "$f" dist/
          done
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux
          path: dist/*
          if-no-files-found: error

  # ── Publish release ──
  publish-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Organize release files
        run: |
          mkdir -p release
          find all-artifacts -type f -exec cp {} release/ \;
          ls -lh release/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(echo "${{ inputs.tag }}" | xargs)
          echo "Creating release with tag: $TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Automated release from CI build" \
            --generate-notes \
            release/*
