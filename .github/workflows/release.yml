name: Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel cffi numpy

      - name: Configure & build native library
        run: |
          cmake -S . -B out/build/windows-clang-cl-cli -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DJXL_SUPERBUILD_ENABLE_CLI=OFF `
            -DWITH_SIMD=OFF
          cmake --build out/build/windows-clang-cl-cli --target jxlpy_native --config Release

      - name: Build wheel
        run: |
          python -m pip wheel . --no-deps -w dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-windows
          path: dist/*.whl

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang ninja-build
          python -m pip install --upgrade pip setuptools wheel cffi numpy

      - name: Configure & build native library
        run: |
          cmake -S . -B out/build/linux-clang-python -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DJXL_SUPERBUILD_ENABLE_CLI=OFF \
            -DWITH_SIMD=OFF
          cmake --build out/build/linux-clang-python --target jxlpy_native --config Release

      - name: Build wheel
        run: |
          python -m pip wheel . --no-deps -w dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-linux
          path: dist/*.whl

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          TAG="v$(date -u +'%Y.%m.%d')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/*.whl

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            Automated build from ${{ steps.tag.outputs.date }}

            **Install:**
            ```bash
            pip install jxlpy-*.whl
            ```
          files: dist/*.whl
          draft: false
          prerelease: false
