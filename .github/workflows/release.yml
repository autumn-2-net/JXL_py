name: Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel cffi numpy

      - name: Configure & build
        run: |
          cmake -S . -B out/build/windows -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DWITH_SIMD=OFF `
            -DAWK=AWK-NOTFOUND
          cmake --build out/build/windows --target jxlpy_native --config Release
          cmake --build out/build/windows --target jxl_cli --config Release

      - name: Build wheel
        run: |
          python -m pip wheel . --no-deps -w dist/

      - name: Collect CLI binaries
        run: |
          mkdir cli
          cp out/build/windows/libjxl/tools/cjxl.exe cli/ 2>$null || true
          cp out/build/windows/libjxl/tools/djxl.exe cli/ 2>$null || true
          cp out/build/windows/libjxl/tools/jxlinfo.exe cli/ 2>$null || true
          cp out/build/windows/libjxl/tools/jxltran.exe cli/ 2>$null || true
          ls cli/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-windows
          path: dist/*.whl

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-windows
          path: cli/*

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang ninja-build
          python -m pip install --upgrade pip setuptools wheel cffi numpy

      - name: Configure & build
        run: |
          cmake -S . -B out/build/linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DWITH_SIMD=OFF \
            -DAWK=AWK-NOTFOUND
          cmake --build out/build/linux --target jxlpy_native --config Release
          cmake --build out/build/linux --target jxl_cli --config Release

      - name: Build wheel
        run: |
          python -m pip wheel . --no-deps -w dist/

      - name: Collect CLI binaries
        run: |
          mkdir cli
          cp out/build/linux/libjxl/tools/cjxl cli/ 2>/dev/null || true
          cp out/build/linux/libjxl/tools/djxl cli/ 2>/dev/null || true
          cp out/build/linux/libjxl/tools/jxlinfo cli/ 2>/dev/null || true
          cp out/build/linux/libjxl/tools/jxltran cli/ 2>/dev/null || true
          tar czf cli-linux.tar.gz -C cli .
          ls cli/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-linux
          path: dist/*.whl

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux
          path: cli-linux.tar.gz

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          TAG="v$(date -u +'%Y.%m.%d')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -laR dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            Automated build from ${{ steps.tag.outputs.date }}

            ## Python wheel
            ```bash
            pip install jxlpy-*.whl
            ```

            ## CLI tools
            - Windows: download `cjxl.exe`, `djxl.exe`, etc.
            - Linux: download `cli-linux.tar.gz` and extract
          files: |
            dist/*.whl
            dist/cjxl.exe
            dist/djxl.exe
            dist/jxlinfo.exe
            dist/jxltran.exe
            dist/cli-linux.tar.gz
          draft: false
          prerelease: false
